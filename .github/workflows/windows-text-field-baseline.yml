name: Windows TextField baseline

on:
  push:
    branches:
      - codex/design-system-icon

jobs:
  text-field-baseline:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.0.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @maxxuxx/docs exec playwright install chromium

      - name: Generate Windows TextField baselines
        run: pnpm --filter @maxxuxx/docs exec playwright test --project=mobile-chromium --project=desktop-chromium --grep "TextField component slice" --update-snapshots

      - name: Compare Windows TextField baselines
        run: pnpm --filter @maxxuxx/docs exec playwright test --project=mobile-chromium --project=desktop-chromium --grep "TextField component slice"

      - name: Upload Windows TextField baselines
        uses: actions/upload-artifact@v4
        with:
          name: windows-text-field-baselines
          path: |
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/text-field-mobile-chromium.png
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/text-field-desktop-chromium.png
          if-no-files-found: error
          retention-days: 1
