name: Verify

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Install Chromium and Linux dependencies
        if: runner.os == 'Linux'
        run: corepack pnpm --filter @hds/docs exec playwright install --with-deps chromium
      - name: Install Chromium
        if: runner.os == 'Windows'
        run: corepack pnpm --filter @hds/docs exec playwright install chromium
      - name: Verify
        run: corepack pnpm verify
