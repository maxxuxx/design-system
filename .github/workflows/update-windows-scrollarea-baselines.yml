name: Update Windows ScrollArea baselines

on:
  push:
    branches:
      - codex/design-system-icon
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-windows-scrollarea-baselines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-windows-scrollarea-baselines:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install locked Playwright Chromium
        run: corepack pnpm --filter @maxxuxx/docs exec playwright install chromium

      - name: Refresh ScrollArea component-slice baselines
        run: >-
          corepack pnpm --filter @maxxuxx/docs exec playwright test
          tests/e2e/component-slices.visual.spec.ts
          --project=mobile-chromium
          --project=desktop-chromium
          --grep "ScrollArea component slice"
          --update-snapshots

      - name: Refresh ScrollArea full-page baselines
        run: >-
          corepack pnpm --filter @maxxuxx/docs exec playwright test
          tests/e2e/visual.spec.ts
          --project=mobile-chromium
          --project=tablet-chromium
          --project=desktop-chromium
          --grep "scroll-area matches the reviewed full-page baseline"
          --update-snapshots

      - name: Verify only allowed ScrollArea baselines changed
        shell: pwsh
        run: |
          $snapshotRoot = 'apps/docs/tests/e2e/__snapshots__'
          $allowed = @(
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/scroll-area-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/scroll-area-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-tablet-chromium.png'
          ) | Sort-Object
          $required = @(
            'apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-tablet-chromium.png'
          )
          $actual = @(git status --porcelain --untracked-files=all -- $snapshotRoot |
            ForEach-Object { $_.Substring(3).Replace('\', '/') } |
            Sort-Object)
          Write-Host "Changed baselines: $($actual -join ', ')"
          $unexpected = @($actual | Where-Object { $_ -notin $allowed })
          $missingRequired = @($required | Where-Object { $_ -notin $actual })
          if ($unexpected.Count -ne 0) {
            throw "Unexpected Windows baseline changes: $($unexpected -join ', ')."
          }
          if ($missingRequired.Count -ne 0) {
            throw "Required full-page baselines did not change: $($missingRequired -join ', ')."
          }

      - name: Compare refreshed component-slice baselines
        run: >-
          corepack pnpm --filter @maxxuxx/docs exec playwright test
          tests/e2e/component-slices.visual.spec.ts
          --project=mobile-chromium
          --project=desktop-chromium
          --grep "ScrollArea component slice"

      - name: Compare refreshed full-page baselines
        run: >-
          corepack pnpm --filter @maxxuxx/docs exec playwright test
          tests/e2e/visual.spec.ts
          --project=mobile-chromium
          --project=tablet-chromium
          --project=desktop-chromium
          --grep "scroll-area matches the reviewed full-page baseline"

      - name: Run the complete Windows browser suite
        run: corepack pnpm --filter @maxxuxx/docs test:e2e

      - name: Write ScrollArea baseline hashes
        shell: pwsh
        run: |
          $files = @(
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/scroll-area-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/scroll-area-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-tablet-chromium.png'
          )
          $files | ForEach-Object {
            $hash = (Get-FileHash $_ -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $_"
          } | Set-Content 'windows-scrollarea-baseline-sha256.txt'

      - name: Upload the five authoritative ScrollArea baselines
        uses: actions/upload-artifact@v4
        with:
          name: windows-scrollarea-translucent-baselines
          path: |
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/scroll-area-desktop-chromium.png
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/scroll-area-mobile-chromium.png
            apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-desktop-chromium.png
            apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-mobile-chromium.png
            apps/docs/tests/e2e/__snapshots__/visual.spec/scroll-area-tablet-chromium.png
            windows-scrollarea-baseline-sha256.txt
          if-no-files-found: error
          retention-days: 1
