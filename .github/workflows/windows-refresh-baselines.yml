name: Windows refresh reviewed baselines

on:
  push:
    branches:
      - codex/design-system-icon

permissions:
  contents: read

jobs:
  refresh-baselines:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install locked Playwright Chromium
        run: corepack pnpm --filter @maxxuxx/docs exec playwright install chromium

      - name: Refresh all Windows baselines
        run: corepack pnpm --filter @maxxuxx/docs test:e2e -- --update-snapshots

      - name: Verify the exact reviewed snapshot set
        shell: pwsh
        run: |
          $snapshotRoot = 'apps/docs/tests/e2e/__snapshots__'
          $pngs = @(Get-ChildItem $snapshotRoot -Recurse -File -Filter '*.png')
          if ($pngs.Count -ne 20) {
            throw "Expected exactly 20 PNG baselines, received $($pngs.Count)."
          }

          $changes = @(git diff --name-only -- $snapshotRoot)
          if ($changes.Count -ne 20) {
            throw "Expected exactly 20 refreshed PNGs, received $($changes.Count): $($changes -join ', ')."
          }
          $unexpected = @($changes | Where-Object { $_ -notmatch '\.png$' })
          if ($unexpected.Count -ne 0) {
            throw "Unexpected non-PNG changes: $($unexpected -join ', ')."
          }

      - name: Immediately compare all refreshed baselines
        run: corepack pnpm --filter @maxxuxx/docs test:e2e

      - name: Upload authoritative Windows baselines
        uses: actions/upload-artifact@v4
        with:
          name: windows-reviewed-baselines
          path: apps/docs/tests/e2e/__snapshots__/**/*.png
          if-no-files-found: error
          retention-days: 1
