name: Windows component baselines

on:
  push:
    branches:
      - codex/design-system-icon

jobs:
  component-baselines:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @maxxuxx/docs exec playwright install chromium

      - name: Update Windows component baselines
        run: pnpm --filter @maxxuxx/docs exec playwright test tests/e2e/component-slices.visual.spec.ts --project=mobile-chromium --project=desktop-chromium --update-snapshots

      - name: Compare Windows component baselines
        run: pnpm --filter @maxxuxx/docs exec playwright test tests/e2e/component-slices.visual.spec.ts --project=mobile-chromium --project=desktop-chromium

      - name: Upload Windows component baselines
        uses: actions/upload-artifact@v4
        with:
          name: windows-component-baselines
          path: |
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/icon-mobile-chromium.png
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/icon-desktop-chromium.png
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/badge-mobile-chromium.png
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/badge-desktop-chromium.png
          if-no-files-found: error
          retention-days: 1
