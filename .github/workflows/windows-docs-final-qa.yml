name: Windows docs final QA

on:
  push:
    branches:
      - codex/design-system-icon

jobs:
  docs-final-qa:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Verify toolchain versions
        shell: pwsh
        run: |
          if ((node --version) -ne 'v24.15.0') {
            throw "Expected Node v24.15.0, received $(node --version)."
          }
          if ((pnpm --version) -ne '11.11.0') {
            throw "Expected pnpm 11.11.0, received $(pnpm --version)."
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install locked Playwright Chromium
        run: pnpm --filter @maxxuxx/docs exec playwright install chromium

      - name: Verify protected Icon and Badge baseline hashes
        shell: pwsh
        run: |
          $expectedHashes = @{
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/badge-desktop-chromium.png' = '74cba09d8532181120fe0302069d446bff2db9e494a917e27ddfb97b8fde2896'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/badge-mobile-chromium.png' = '3ec274661d58bf2df736571ab984f056e2d45342cc81ac872457666d61924a3a'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/icon-desktop-chromium.png' = 'fae59f68783673249bd8add2e49cc4348c918bd3759404dcef3e9e838a15d4f4'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/icon-mobile-chromium.png' = 'c3235a626555e791aeb913873ea6f247dd0ea62aaeb02766f5ed35b8b6edeaa9'
          }
          foreach ($entry in $expectedHashes.GetEnumerator()) {
            $actual = (Get-FileHash $entry.Key -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne $entry.Value) {
              throw "Protected baseline changed at $($entry.Key): $actual."
            }
          }

      - name: Prove twelve baselines are missing and four are stale
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP 'missing-full-page-baselines.log'
          $ErrorActionPreference = 'Continue'
          & pnpm --filter @maxxuxx/docs test:e2e *> $logPath
          $exitCode = $LASTEXITCODE
          $ErrorActionPreference = 'Stop'
          Get-Content $logPath
          if ($exitCode -eq 0) {
            throw 'The first Windows run unexpectedly passed without the twelve required baselines.'
          }

          $output = Get-Content $logPath -Raw
          $output = $output -replace "`e\[[0-9;]*[A-Za-z]", ''
          $missingCount = ([regex]::Matches($output, "A snapshot doesn't exist at")).Count
          if ($missingCount -ne 12) {
            throw "Expected 12 missing-snapshot failures, received $missingCount."
          }
          if ($output -notmatch '(?m)^\s*16 failed\s*$') {
            throw 'The first Windows run did not report exactly 16 failed tests.'
          }
          if ($output -notmatch '(?m)^\s*10 skipped\s*$') {
            throw 'The first Windows run did not preserve exactly 10 expected skips.'
          }
          if ($output -notmatch '(?m)^\s*112 passed') {
            throw 'The first Windows run did not preserve exactly 112 passing tests.'
          }
          $staleCases = @(
            '\[mobile-chromium\].*Button component slice'
            '\[mobile-chromium\].*TextField component slice'
            '\[desktop-chromium\].*Button component slice'
            '\[desktop-chromium\].*TextField component slice'
          )
          foreach ($staleCase in $staleCases) {
            if ($output -notmatch $staleCase) {
              throw "Expected stale component-slice failure was absent: $staleCase."
            }
          }

      - name: Delete files created by the missing-baseline run
        shell: pwsh
        run: |
          $target = 'apps/docs/tests/e2e/__snapshots__/visual.spec'
          Remove-Item $target -Recurse -Force -ErrorAction SilentlyContinue
          if (Test-Path $target) {
            throw "Failed to remove $target before approved generation."
          }

      - name: Generate twelve Windows full-page baselines
        run: pnpm --filter @maxxuxx/docs exec playwright test tests/e2e/visual.spec.ts --update-snapshots

      - name: Refresh only the four stale component baselines
        run: pnpm --filter @maxxuxx/docs exec playwright test tests/e2e/component-slices.visual.spec.ts --project=mobile-chromium --project=desktop-chromium --grep "^(Button|TextField) component slice$" --update-snapshots

      - name: Verify the exact sixteen-file snapshot diff
        shell: pwsh
        run: |
          $expected = @(
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/button-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/button-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/text-field-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/text-field-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/button-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/button-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/button-tablet-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/foundations-colors-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/foundations-colors-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/foundations-colors-tablet-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/home-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/home-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/home-tablet-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/text-field-desktop-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/text-field-mobile-chromium.png'
            'apps/docs/tests/e2e/__snapshots__/visual.spec/text-field-tablet-chromium.png'
          ) | Sort-Object
          $actual = @(git status --porcelain --untracked-files=all -- apps/docs/tests/e2e/__snapshots__) |
            ForEach-Object { $_.Substring(3).Trim('"').Replace('\', '/') } |
            Sort-Object
          if ($actual.Count -ne 16) {
            throw "Expected exactly 16 changed PNGs, received $($actual.Count): $($actual -join ', ')."
          }
          $difference = Compare-Object -ReferenceObject $expected -DifferenceObject $actual
          if ($difference) {
            throw "Windows snapshot diff differs: $($difference | Out-String)."
          }

          $protectedHashes = @{
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/badge-desktop-chromium.png' = '74cba09d8532181120fe0302069d446bff2db9e494a917e27ddfb97b8fde2896'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/badge-mobile-chromium.png' = '3ec274661d58bf2df736571ab984f056e2d45342cc81ac872457666d61924a3a'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/icon-desktop-chromium.png' = 'fae59f68783673249bd8add2e49cc4348c918bd3759404dcef3e9e838a15d4f4'
            'apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/icon-mobile-chromium.png' = 'c3235a626555e791aeb913873ea6f247dd0ea62aaeb02766f5ed35b8b6edeaa9'
          }
          foreach ($entry in $protectedHashes.GetEnumerator()) {
            $actualHash = (Get-FileHash $entry.Key -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualHash -ne $entry.Value) {
              throw "Protected baseline changed at $($entry.Key): $actualHash."
            }
          }

      - name: Immediately compare the sixteen reviewed baselines
        run: |
          pnpm --filter @maxxuxx/docs exec playwright test tests/e2e/visual.spec.ts
          pnpm --filter @maxxuxx/docs exec playwright test tests/e2e/component-slices.visual.spec.ts --project=mobile-chromium --project=desktop-chromium --grep "^(Button|TextField) component slice$"

      - name: Run the complete Windows browser suite
        run: pnpm --filter @maxxuxx/docs test:e2e

      - name: Upload authoritative Windows baselines
        uses: actions/upload-artifact@v4
        with:
          name: windows-docs-reviewed-baselines
          path: |
            apps/docs/tests/e2e/__snapshots__/visual.spec/*.png
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/button-*.png
            apps/docs/tests/e2e/__snapshots__/component-slices.visual.spec/text-field-*.png
          if-no-files-found: error
          retention-days: 1
