name: Update Windows baselines

on:
  push:
    branches:
      - codex/design-system-icon

permissions:
  contents: read

jobs:
  update-windows-baselines:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install locked Playwright Chromium
        run: corepack pnpm --filter @maxxuxx/docs exec playwright install chromium

      - name: Refresh Windows visual baselines
        run: >-
          corepack pnpm --filter @maxxuxx/docs exec playwright test
          tests/e2e/component-slices.visual.spec.ts
          tests/e2e/visual.spec.ts
          --update-snapshots

      - name: Verify the exact baseline inventory
        shell: pwsh
        run: |
          $snapshotRoot = 'apps/docs/tests/e2e/__snapshots__'
          $expected = @(
            'component-slices.visual.spec/badge-desktop-chromium.png'
            'component-slices.visual.spec/badge-mobile-chromium.png'
            'component-slices.visual.spec/button-desktop-chromium.png'
            'component-slices.visual.spec/button-mobile-chromium.png'
            'component-slices.visual.spec/icon-desktop-chromium.png'
            'component-slices.visual.spec/icon-mobile-chromium.png'
            'component-slices.visual.spec/scroll-area-desktop-chromium.png'
            'component-slices.visual.spec/scroll-area-mobile-chromium.png'
            'component-slices.visual.spec/text-field-desktop-chromium.png'
            'component-slices.visual.spec/text-field-mobile-chromium.png'
            'visual.spec/button-desktop-chromium.png'
            'visual.spec/button-mobile-chromium.png'
            'visual.spec/button-tablet-chromium.png'
            'visual.spec/foundations-colors-desktop-chromium.png'
            'visual.spec/foundations-colors-mobile-chromium.png'
            'visual.spec/foundations-colors-tablet-chromium.png'
            'visual.spec/home-desktop-chromium.png'
            'visual.spec/home-mobile-chromium.png'
            'visual.spec/home-tablet-chromium.png'
            'visual.spec/scroll-area-desktop-chromium.png'
            'visual.spec/scroll-area-mobile-chromium.png'
            'visual.spec/scroll-area-tablet-chromium.png'
            'visual.spec/text-field-desktop-chromium.png'
            'visual.spec/text-field-mobile-chromium.png'
            'visual.spec/text-field-tablet-chromium.png'
          ) | Sort-Object
          $actual = @(Get-ChildItem $snapshotRoot -Recurse -File -Filter '*.png' |
            ForEach-Object { $_.FullName.Substring((Resolve-Path $snapshotRoot).Path.Length + 1).Replace('\', '/') } |
            Sort-Object)
          $difference = Compare-Object -ReferenceObject $expected -DifferenceObject $actual
          if ($difference) {
            throw "Windows snapshot inventory differs: $($difference | Out-String)."
          }

          $changes = @(git status --porcelain --untracked-files=all -- $snapshotRoot)
          if ($changes.Count -lt 5) {
            throw "Expected at least the five new ScrollArea PNGs, received $($changes.Count)."
          }
          $unexpected = @($changes | Where-Object { $_ -notmatch '\.png$' })
          if ($unexpected.Count -ne 0) {
            throw "Unexpected non-PNG snapshot changes: $($unexpected -join ', ')."
          }

      - name: Compare refreshed Windows visual baselines
        run: >-
          corepack pnpm --filter @maxxuxx/docs exec playwright test
          tests/e2e/component-slices.visual.spec.ts
          tests/e2e/visual.spec.ts

      - name: Run the complete Windows browser suite
        run: corepack pnpm --filter @maxxuxx/docs test:e2e

      - name: Write baseline hashes
        shell: pwsh
        run: |
          Get-ChildItem 'apps/docs/tests/e2e/__snapshots__' -Recurse -File -Filter '*.png' |
            Sort-Object FullName |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              $path = $_.FullName.Substring((Resolve-Path '.').Path.Length + 1).Replace('\', '/')
              "$hash  $path"
            } | Set-Content 'windows-baseline-sha256.txt'

      - name: Upload authoritative Windows baselines
        uses: actions/upload-artifact@v4
        with:
          name: windows-scroll-area-baselines
          path: |
            apps/docs/tests/e2e/__snapshots__/**/*.png
            windows-baseline-sha256.txt
          if-no-files-found: error
          retention-days: 1
